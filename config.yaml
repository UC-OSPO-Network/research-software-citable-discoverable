#------------------------------------------------------------
# Values for this lesson.
#------------------------------------------------------------

# Which carpentry is this (swc, dc, lc, or cp)?
# swc: Software Carpentry
# dc: Data Carpentry
# lc: Library Carpentry
# cp: Carpentries (to use for instructor training for instance)
# incubator: The Carpentries Incubator
#
# This option supports custom types so lessons can be branded
# and themed with your own logo and alt-text (see `carpentry_description`)
# See https://carpentries.github.io/sandpaper-docs/editing.html#adding-a-custom-logo
carpentry: 'ucospo'

# Alt-text description of the lesson.
carpentry_description: 'UC OSPO Network'

# Overall title for pages.
title: 'Sharing Research Software: Reproducible, Citable, and Discoverable'

# Date the lesson was created (YYYY-MM-DD, this is empty by default)
created: 2025-12-06

# Comma-separated list of keywords for the lesson
keywords: 'research software, software citation, reproducibility, Git, GitHub, pixi, packaging, metadata, discoverability, open source, FAIR, citable software, research workflows'

# Life cycle stage of the lesson
# possible values: pre-alpha, alpha, beta, stable
life_cycle: 'pre-alpha'

# License of the lesson
license: 'CC-BY 4.0'

# Link to the source repository for this lesson
source: 'https://github.com/UC-OSPO-Network/research-software-citable-discoverable'

# Default branch of your lesson
branch: 'main'

# Who to contact if there are any issues
contact: 'tdennis@library.ucla.edu'

# Navigation ------------------------------------------------
#
# Use the following menu items to specify the order of
# individual pages in each dropdown section. Leave blank to
# include all pages in the folder.
#
# Example -------------
#
# episodes:
# - introduction.md
# - first-steps.md
#
# learners:
# - setup.md
#
# instructors:
# - instructor-notes.md
#
# profiles:
# - one-learner.md
# - another-learner.md

# Order of episodes in your lesson
episodes:
- introduction.md               # Episode 0: Problem framing, FAIR4RS, software citation — 15 min teaching
- sharing-software.md           # Episode 1: Exploring 01-start branch
- open-source-license.md        # Episode 2: Adding LICENSE → 02-license branch
- adding-citation-file.md       # Episode 3: Adding CITATION.cff → 04-citation branch
- making-software-citable.md    # Episode 4: Creating release → 05-release branch
- managing-environments-pixi.md # Episode 5: Adding pixi → 03-pixi branch (OPTIONAL — reproducibility deep-dive)
- improving-metadata-discoverability.md # Episode 6: Final improvements → 06-metadata branch
- wrap-up-reflect.md            # Episode 7: Reflection and next steps
# why-software-citation.md — merged into introduction.md (2026-05-26)

# Information for Learners
learners:

# Information for Instructors
instructors:

# Learner Profiles
profiles:

# Customisation ---------------------------------------------
#
# This space below is where custom yaml items (e.g. pinning
# sandpaper and varnish versions) should live

varnish: UC-OSPO-Network/varnish
